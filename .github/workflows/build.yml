name: Build and Publish with attestation

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Use Pixi to install rattler-build
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: build        

      - name: Build and publish packages with attestation
        shell: bash
        run: |
          pixi run publish --generate-attestation